<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="4" fill="#0D1117"/>
  <!-- Chip body -->
  <rect x="8" y="8" width="16" height="16" rx="2" fill="none" stroke="#FF8C00" stroke-width="1.5"/>
  <!-- Pins top -->
  <line x1="12" y1="8" x2="12" y2="5" stroke="#FF8C00" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="8" x2="16" y2="5" stroke="#FF8C00" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="20" y1="8" x2="20" y2="5" stroke="#FF8C00" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Pins bottom -->
  <line x1="12" y1="24" x2="12" y2="27" stroke="#FF8C00" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="24" x2="16" y2="27" stroke="#FF8C00" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="20" y1="24" x2="20" y2="27" stroke="#FF8C00" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Pins left -->
  <line x1="8" y1="12" x2="5" y2="12" stroke="#FF8C00" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="8" y1="16" x2="5" y2="16" stroke="#FF8C00" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="8" y1="20" x2="5" y2="20" stroke="#FF8C00" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Pins right -->
  <line x1="24" y1="12" x2="27" y2="12" stroke="#FF8C00" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="24" y1="16" x2="27" y2="16" stroke="#FF8C00" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="24" y1="20" x2="27" y2="20" stroke="#FF8C00" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Inner die -->
  <rect x="11" y="11" width="10" height="10" rx="1" fill="#FF8C00" opacity="0.15"/>
</svg>
