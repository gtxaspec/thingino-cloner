<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>thingino · Web Flasher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        :root { --bs-font-sans-serif: "Montserrat", sans-serif; }
        body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; background: #0d1117; }
        .flasher-card { width: 100%; max-width: 720px; }
        .card-title { color: darkorange; }
        #log {
            height: 260px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.78rem;
            line-height: 1.4;
            white-space: pre-wrap;
            word-break: break-all;
            background: #010409;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 0.6rem;
        }
        #log .info { color: #c9d1d9; }
        #log .debug { color: #484f58; }
        #log .warn { color: darkorange; }
        #log .error { color: #f85149; }
        .device-info { font-size: 0.9rem; }
        .device-info .label { color: #8b949e; }
        .device-info .value { color: darkorange; font-family: monospace; }
        .progress { height: 6px; }
        .file-info { font-size: 0.85rem; color: #8b949e; }
        input[type="file"] { display: none; }
    </style>
</head>
<body class="p-3">

<div class="flasher-card">
    <!-- Header -->
    <div class="card mb-3">
        <div class="card-header d-flex align-items-center gap-2">
            <h2 class="card-title mb-0 fs-5">
                <i class="bi bi-cpu me-1"></i> Thingino Web Flasher for Ingenic
            </h2>
            <span id="status-badge" class="badge bg-secondary ms-auto">Idle</span>
        </div>

        <!-- Device Info -->
        <div class="card-body">
            <div id="device-disconnected">
                <button id="btn-connect" class="btn btn-outline-primary btn-sm" onclick="connectDevice()">
                    <i class="bi bi-usb-symbol me-1"></i> Connect Device
                </button>
                <span class="text-secondary ms-2 small">WebUSB &middot; Chrome / Edge</span>
            </div>
            <div id="device-info" class="device-info d-none">
                <div class="row g-2">
                    <div class="col-auto"><span class="label">SoC:</span> <span class="value" id="info-soc">—</span></div>
                    <div class="col-auto"><span class="label">Stage:</span> <span class="value" id="info-stage">—</span></div>
                    <div class="col-auto"><span class="label">VID:PID:</span> <span class="value" id="info-vidpid">—</span></div>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="card-footer">
            <div class="d-flex flex-wrap align-items-center gap-2">
                <button id="btn-bootstrap" class="btn btn-outline-secondary btn-sm" onclick="doBootstrap()" disabled>
                    <i class="bi bi-arrow-repeat me-1"></i> Bootstrap
                </button>
                <button id="btn-write" class="btn btn-outline-warning btn-sm" onclick="selectFirmware()" disabled>
                    <i class="bi bi-download me-1"></i> Write Firmware
                </button>
                <button id="btn-read" class="btn btn-outline-info btn-sm" onclick="doRead()" disabled>
                    <i class="bi bi-upload me-1"></i> Read Firmware
                </button>
            </div>
            <div class="file-info mt-1" id="file-info"></div>
            <input type="file" id="firmware-file" accept=".bin" onchange="firmwareSelected(this)">

            <div id="progress" class="mt-2 d-none">
                <div class="progress">
                    <div class="progress-bar bg-warning" id="progress-fill" role="progressbar" style="width: 0%"></div>
                </div>
                <small class="text-secondary" id="progress-label">Initializing...</small>
            </div>
        </div>
    </div>

    <!-- Log -->
    <div class="card">
        <div class="card-header d-flex align-items-center gap-2">
            <h2 class="card-title mb-0 fs-6">
                <i class="bi bi-terminal me-1"></i> Log
            </h2>
        </div>
        <div class="card-body p-2">
            <div id="log"></div>
        </div>
    </div>
</div>

<div id="browser-warning" class="alert alert-danger flasher-card mt-3 text-center d-none">
    <i class="bi bi-exclamation-triangle me-1"></i>
    WebUSB is required. Please use <strong>Chrome</strong> or <strong>Edge</strong>.
</div>

<script src="dist/cloner.js"></script>
<script src="src/app.js"></script>
</body>
</html>
