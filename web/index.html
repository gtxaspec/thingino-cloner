<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thingino Web Flasher</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #00d4ff;
        }
        .subtitle {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 2rem;
        }
        .panel {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 1.5rem;
            width: 100%;
            max-width: 640px;
            margin-bottom: 1rem;
        }
        .panel h2 {
            font-size: 0.9rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }
        .device-info {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 0.3rem 1rem;
            font-size: 0.9rem;
        }
        .device-info .label { color: #888; }
        .device-info .value { color: #00d4ff; font-family: monospace; }
        button {
            background: #0f3460;
            color: #00d4ff;
            border: 1px solid #00d4ff;
            padding: 0.75rem 2rem;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        button:hover { background: #00d4ff; color: #1a1a2e; }
        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            background: #0f3460;
            color: #00d4ff;
        }
        .actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }
        .progress-container {
            display: none;
            margin-top: 1rem;
        }
        .progress-container.active { display: block; }
        .progress-bar {
            height: 6px;
            background: #0f3460;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }
        .progress-bar .fill {
            height: 100%;
            background: #00d4ff;
            width: 0%;
            transition: width 0.3s;
        }
        .progress-label {
            font-size: 0.8rem;
            color: #888;
        }
        #log {
            background: #0a0a1a;
            border: 1px solid #0f3460;
            border-radius: 6px;
            padding: 0.75rem;
            height: 250px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            line-height: 1.4;
            white-space: pre-wrap;
            word-break: break-all;
        }
        #log .info { color: #e0e0e0; }
        #log .debug { color: #666; }
        #log .warn { color: #f0ad4e; }
        #log .error { color: #ff4444; }
        .status {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 0.5rem;
        }
        .status.disconnected { background: #666; }
        .status.bootrom { background: #f0ad4e; }
        .status.firmware { background: #00d4ff; }
        .status.ready { background: #00ff88; }
        .browser-warning {
            background: #3e1616;
            border: 1px solid #ff4444;
            border-radius: 8px;
            padding: 1.5rem;
            width: 100%;
            max-width: 640px;
            text-align: center;
            color: #ff4444;
        }
        input[type="file"] { display: none; }
        .file-info {
            font-size: 0.85rem;
            color: #888;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <h1>Thingino Web Flasher</h1>
    <p class="subtitle">Flash Ingenic SoC devices directly from your browser via WebUSB</p>

    <div id="browser-warning" class="browser-warning" style="display: none;">
        WebUSB is required. Please use Chrome or Edge.
    </div>

    <div id="app">
        <!-- Device Panel -->
        <div class="panel">
            <h2><span id="status-dot" class="status disconnected"></span>Device</h2>
            <div id="device-disconnected">
                <button id="btn-connect" onclick="connectDevice()">Connect Device</button>
            </div>
            <div id="device-info" class="device-info" style="display: none;">
                <span class="label">SoC:</span>
                <span class="value" id="info-soc">—</span>
                <span class="label">Stage:</span>
                <span class="value" id="info-stage">—</span>
                <span class="label">VID:PID:</span>
                <span class="value" id="info-vidpid">—</span>
            </div>
        </div>

        <!-- Actions Panel -->
        <div class="panel">
            <h2>Actions</h2>
            <div class="actions">
                <button id="btn-bootstrap" onclick="doBootstrap()" disabled>Bootstrap</button>
                <button id="btn-write" onclick="selectFirmware()" disabled>Write Firmware</button>
                <button id="btn-read" onclick="doRead()" disabled>Read Firmware</button>
            </div>
            <div class="file-info" id="file-info"></div>
            <input type="file" id="firmware-file" accept=".bin" onchange="firmwareSelected(this)">

            <div id="progress" class="progress-container">
                <div class="progress-bar"><div class="fill" id="progress-fill"></div></div>
                <span class="progress-label" id="progress-label">Initializing...</span>
            </div>
        </div>

        <!-- Log Panel -->
        <div class="panel">
            <h2>Log</h2>
            <div id="log"></div>
        </div>
    </div>

    <script src="dist/cloner.js"></script>
    <script src="src/app.js"></script>
</body>
</html>
